                <script>
document.addEventListener("DOMContentLoaded", function() {
    const btcPriceElement = document.getElementById('btcPrice'); 
    let pauseUpdates = false;
    function updateBitcoinPrice() {
        if (!pauseUpdates) {
            fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT')
                .then(response => {
                    if (response.status === 429) {
                        console.warn('Rate limit exceeded. Pausing updates.');
                        pauseUpdates = true;
                        setTimeout(() => {
                            pauseUpdates = false;
                        }, 60000); // Pause for 1 minute
                        return;
                    }
                    return response.json();
                })
                .then(data => {
                    if (btcPriceElement && data && data.price) {
                        const formattedPrice = parseFloat(data.price).toLocaleString('en-US', {
                            minimumFractionDigits: 2,
                            maximumFractionDigits: 2
                        });
                        btcPriceElement.innerHTML = `
                            <div style="display: flex;"><img src="https://uploads-ssl.webflow.com/65e9c5a26e8864c80aafb002/66047b0e56be8e998c63a278_bitcoin.webp" alt="Bitcoin Logo" style="height: 1.5em; vertical-align: middle; padding-right: 3px;"/>
                            <span style="font-weight: 600; font-size: 1.5em; font-family: 'Intertight Variablefont Wght', sans-serif; color: black; line-height: 1.1; min-width: 120px;">$${formattedPrice}</span></div>
                        `;
                    }
                })
                .catch(error => console.error('Error fetching Bitcoin price:', error));
        }
    }
    updateBitcoinPrice();
    setInterval(updateBitcoinPrice, 30000); // Update every 30 sec
});
</script>
