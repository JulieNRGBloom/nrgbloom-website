  <div class="w-embed w-script">
    <div id="pool-dashboard">
      <canvas id="pool-chart" style="max-height: 600px;"></canvas>
      <h4>AI-Generated Advice</h4>
      <pre id="ai-summary" style="white-space: pre-wrap;">Loading advice…</pre>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
;(async()=>{
  const dataUrl    = 'https://s3.us-east-2.amazonaws.com/pool.metrics.bucket/pool_metrics.json';
  const summaryUrl = 'https://s3.us-east-2.amazonaws.com/pool.metrics.bucket/ai_summary.txt';
  // 1) Fetch table + summary
  const [tR, sR] = await Promise.all([fetch(dataUrl), fetch(summaryUrl)]);
  const table    = await tR.json();
  document.getElementById('ai-summary').textContent = await sR.text();
  // 2) Build labels & methods
  const labels  = table.map(r => r.Pool);
  const methods = ['FPPS','PPLNS','DATUM','PPS+','SOLO'];
  // 3) Define a color for each method
  const colorMap = {
    FPPS:  'rgba(54,162,235,0.7)',
    PPLNS: 'rgba(255,99,132,0.7)',
    DATUM: 'rgba(75,192,192,0.7)',
    'PPS+':'rgba(153,102,255,0.7)',
    SOLO:  'rgba(255,159,64,0.7)'
  };
  // 4) One dataset per method, picking its color
  const datasets = methods.map(kind => ({
    label: kind,
    data:  table.map(row => row[kind] ?? NaN),
    backgroundColor: colorMap[kind],
    borderColor:     colorMap[kind].replace(/0\.7\)$/, '1)'),
    borderWidth:     1
  }));
  // 5) Draw horizontal bar chart
  new Chart(
    document.getElementById('pool-chart').getContext('2d'),
    {
      type: 'bar',
      data: { labels, datasets },
      options: {
        indexAxis: 'y',
        responsive: true,
        scales: {
          x: {
            title: { display: true, text: 'BTC per TH/s' },
            ticks: { callback: v => v.toFixed(8) }
          }
        },
        plugins: {
          legend: { position: 'top' },
          tooltip: {
            callbacks: {
              label: ctx => {
                const v = ctx.parsed.x;
                return `${ctx.dataset.label}: ${v?.toFixed(8) ?? '—'} BTC/TH`;
              }
            }
          }
        }
      }
    }
  );
})().catch(err => {
  console.error(err);
  document.getElementById('pool-dashboard')
          .innerHTML = '<p>Error loading data.</p>';
});
</script>
